name: Deploy to Amazon ECR

# どのタイミングで自動化ロボを動かすかの設定
on:
  push:
    branches:
      - coszou  # mainブランチに「git push」された時に起動

env:
  AWS_REGION: ap-northeast-1                   # 東京リージョン
  ECR_REPOSITORY: cosme-rag-app-repo            # 先ほど作った倉庫の名前

jobs:
  deploy:
    name: Build and Push
    runs-on: ubuntu-latest # GitHubが用意してくれる最新のLinux環境で実行

    steps:
    # 1. GitHub上にあるあなたのソースコードを、ロボットの作業場にコピーする
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. ロボットの作業場に、AWSの認証情報（アクセスキー）を設定する
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 3. AWSの倉庫（ECR）にログインする
    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 4. Dockerイメージをビルドし、ECRにプッシュする
    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        # Macとクラウドの環境差を防ぐため、AMD64（クラウド用）向けにビルドを指示
        docker buildx build --platform linux/amd64 -t $ECR_REGISTRY/$ECR_REPOSITORY:latest --push .